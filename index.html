<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Remark Editor</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f2f4f8;
            --card: #ffffff;
            --text: #222;
            --input: #ffffff;
            --border: #d8d8d8;
            --primary: #1976d2;
        }

        body.dark {
            --bg: #0a0a0a;
            --card: #1e1e1e;
            --text: #f5f5f5;
            --input: #2b2b2b;
            --border: #3d3d3d;
            --primary: #2196f3;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(-45deg, #0f766e, #1e88e5, #26a69a, #1565c0);
            background-size: 400% 400%;
            animation: bg 18s ease infinite;
            padding: 15px;
            color: var(--text);
            min-height: 100vh;
            transition: 0.4s;
        }

        @keyframes bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .box {
            max-width: 850px;
            margin: auto;
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.4s;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 23px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* سوئیچ تم Material Design */
        .theme-switch {
            position: relative;
            width: 52px;
            height: 28px;
            background: #bbb;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        body.dark .theme-switch {
            background: #4caf50;
        }

        .theme-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        body.dark .theme-switch::after {
            transform: translateX(24px);
        }

        label {
            display: block;
            margin: 16px 0 8px;
            font-weight: 500;
            color: var(--text);
        }

        .input-group {
            position: relative;
        }

        .input-group svg {
            position: absolute;
            top: 13px;
            right: 14px;
            width: 20px;
            height: 20px;
            fill: #666;
        }

        textarea, input {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--input);
            color: var(--text);
            font-size: 15px;
            transition: 0.3s;
        }

        textarea {
            height: 170px;
            resize: vertical;
        }

        textarea:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33,150,243,0.15);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin: 18px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        /* Ripple Effect */
        button .ripple {
            position: absolute;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        .change { background: linear-gradient(135deg, #1976d2, #1565c0); }
        .copy   { background: linear-gradient(135deg, #2e7d32, #1b5e20); }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13.5px;
            opacity: 0.85;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="top">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM12 17l-5-5 1.41-1.41L11 13.17V7h2v6.17l2.59-2.58L17 12l-5 5z"/></svg>
                ویرایش نام کانفیگ
            </h2>
            <div class="theme-switch" onclick="toggleTheme()"></div>
        </div>

        <label>متن ورودی</label>
        <div class="input-group">
            <textarea id="input" placeholder="کانفیگ vless یا trojan خود را اینجا paste کنید..."></textarea>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </div>

        <label>نام جدید Remark</label>
        <div class="input-group">
            <input id="remark" placeholder="مثال: Germany 🇩🇪 یا Singapore">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86L12 11.5l-.69-1.36L9.5 9.5l1.36-.69L12 7.5l.69 1.36L14.5 9.5z"/></svg>
        </div>

        <div class="buttons">
            <button class="change" onclick="convert()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6V4H6v2h10zM4 18h10v2H4v-2zM20 12l-6-6v12l6-6z"/></svg>
                تغییر نام
            </button>
            <button class="copy" onclick="copyText()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                کپی
            </button>
        </div>

        <label>خروجی</label>
        <textarea id="output" readonly></textarea>

        <div class="footer">
            Developed by <strong>@Config0plus</strong><br>
            <a href="https://t.me/Config0plus" target="_blank">t.me/Config0plus</a>
        </div>
    </div>

    <script>
        // لود تم قبلی
        if (localStorage.theme === "dark") {
            document.body.classList.add("dark");
        }

        function toggleTheme() {
            document.body.classList.toggle("dark");
            localStorage.theme = document.body.classList.contains("dark") ? "dark" : "light";
        }

        function createRipple(event) {
            const button = event.currentTarget;
            const ripple = document.createElement("span");
            ripple.classList.add("ripple");
            
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + "px";
            ripple.style.left = (event.clientX - rect.left - size/2) + "px";
            ripple.style.top = (event.clientY - rect.top - size/2) + "px";
            
            button.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // اضافه کردن ripple به دکمه‌ها
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', createRipple);
        });

        function convert() {
            let text = document.getElementById("input").value.trim();
            let name = document.getElementById("remark").value.trim();

            if (!name) {
                showToast("لطفاً نام جدید Remark را وارد کنید", "error");
                return;
            }

            let configs = text.match(/(vless:\/\/[^\s]+|trojan:\/\/[^\s]+)/g);

            if (!configs || configs.length === 0) {
                showToast("هیچ کانفیگ vless یا trojan پیدا نشد", "error");
                return;
            }

            let result = configs.map(config => {
                let hashIndex = config.indexOf("#");
                if (hashIndex !== -1) config = config.substring(0, hashIndex);
                return config + "#" + encodeURIComponent(name);
            });

            document.getElementById("output").value = result.join("\n");
            showToast(`✅ ${configs.length} کانفیگ با موفقیت تغییر نام یافت`);
        }

        function copyText() {
            let text = document.getElementById("output").value.trim();
            if (!text) {
                showToast("ابتدا کانفیگ‌ها را تبدیل کنید", "error");
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showToast("✅ متن با موفقیت کپی شد");
            }).catch(() => {
                showToast("کپی با مشکل مواجه شد", "error");
            });
        }

        function showToast(message, type = "success") {
            const toast = document.createElement("div");
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                padding: 14px 22px; border-radius: 14px; color: white; font-size: 15px;
                background: ${type === "error" ? "#d32f2f" : "#2e7d32"};
                box-shadow: 0 6px 20px rgba(0,0,0,0.25);
                z-index: 10000; white-space: nowrap;
                animation: toastPop 2.8s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }
    </script>
</body>
</html>
